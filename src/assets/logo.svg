<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#2a3d1c"/>

  <!-- Leaf pattern — scattered outlines matching logo style -->
  <g fill="none" stroke="#3d5c2a" stroke-width="2" stroke-linecap="round">

    <!-- Each leaf: oval body path + midrib line, various positions/rotations -->

    <!-- top-left -->
    <g transform="translate(30,32) rotate(-35)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- top-center -->
    <g transform="translate(100,18) rotate(10)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- top-right -->
    <g transform="translate(170,38) rotate(55)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- left side -->
    <g transform="translate(14,105) rotate(-20)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- right side -->
    <g transform="translate(186,115) rotate(30)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- bottom-left -->
    <g transform="translate(45,172) rotate(-55)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- bottom-right -->
    <g transform="translate(158,168) rotate(40)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- bottom-center -->
    <g transform="translate(100,188) rotate(15)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- upper-mid left -->
    <g transform="translate(65,68) rotate(70)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

    <!-- upper-mid right -->
    <g transform="translate(148,72) rotate(-10)">
      <path d="M0,-22 C12,-14 17,-3 17,8 C17,19 10,25 0,25 C-10,25 -17,19 -17,8 C-17,-3 -12,-14 0,-22 Z"/>
      <line x1="0" y1="-20" x2="0" y2="23" stroke-width="1.5"/>
    </g>

  </g>

  <!-- "ECP!" — shadow layer slightly offset, then gold fill on top -->
  <text x="103" y="133"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="bold"
    font-size="62"
    fill="#7a1a1a">ECP!</text>
  <text x="100" y="130"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="bold"
    font-size="62"
    fill="#e8c040">ECP!</text>
</svg>
